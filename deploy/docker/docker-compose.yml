# Runtime-only Compose: assumes the application image has already been
# built locally as ${IMAGE} (default: celery-crawl-hub:latest).
#
# Build the image first:
#   make build
# or manually:
#   docker build -f deploy/docker/BaseDockerfile -t celery-crawl-hub:base .
#   docker build -f deploy/docker/Dockerfile     -t celery-crawl-hub:latest .
#
# Then start the stack from the project root:
#   docker compose -f deploy/docker/docker-compose.yml up -d
#
# Compose loads `.env` automatically from the project root.

x-app-env: &app-env
  env_file:
    - ../../${APP_ENV_FILE:-.env}
  environment:
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_HOST_ANOTHER: postgres
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/1
    PROD_REDIS_HOST: redis
    TEST_REDIS_HOST: redis

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crawler_studio}
      POSTGRES_USER: ${POSTGRES_USERNAME:-crawler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../sql/crawler_tasks.sql:/docker-entrypoint-initdb.d/01-crawler-tasks.sql:ro
      - ../../sql/ex_crawl_log.sql:/docker-entrypoint-initdb.d/02-ex-crawl-log.sql:ro
      - ../../sql/ex_shipping_information.sql:/docker-entrypoint-initdb.d/03-ex-shipping-information.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-crawler} -d ${POSTGRES_DB:-crawler_studio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-migrate:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - ../../sql/crawler_tasks.sql:/migrations/01-crawler-tasks.sql:ro
      - ../../sql/ex_crawl_log.sql:/migrations/02-ex-crawl-log.sql:ro
      - ../../sql/ex_shipping_information.sql:/migrations/03-ex-shipping-information.sql:ro
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        psql -h postgres -U ${POSTGRES_USERNAME:-crawler} -d ${POSTGRES_DB:-crawler_studio} -f /migrations/01-crawler-tasks.sql &&
        psql -h postgres -U ${POSTGRES_USERNAME:-crawler} -d ${POSTGRES_DB:-crawler_studio} -f /migrations/02-ex-crawl-log.sql &&
        psql -h postgres -U ${POSTGRES_USERNAME:-crawler} -d ${POSTGRES_DB:-crawler_studio} -f /migrations/03-ex-shipping-information.sql &&
        echo 'Migrations completed successfully.'
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  crawler-api:
    image: ${IMAGE:-celery-crawl-hub:latest}
    pull_policy: never
    <<: *app-env
    command: ["python", "main.py"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/login"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  crawler-celery-worker:
    image: ${IMAGE:-celery-crawl-hub:latest}
    pull_policy: never
    <<: *app-env
    command:
      - celery
      - -A
      - src.main.tasks.celery_app:celery_app
      - worker
      - -n
      - crawler_worker@%h
      - -Q
      - celery
      - -l
      - info
      - --pool=prefork
      - --concurrency=${CRAWLER_WORKER_CONCURRENCY:-4}
      - --prefetch-multiplier=1
      - --max-tasks-per-child=50
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  translate-schedule-worker:
    image: ${IMAGE:-celery-crawl-hub:latest}
    pull_policy: never
    <<: *app-env
    command:
      - celery
      - -A
      - src.main.tasks.celery_app:celery_app
      - worker
      - -n
      - translate_schedule@%h
      - -Q
      - translate_schedule
      - -l
      - info
      - --pool=prefork
      - --concurrency=${TRANSLATE_WORKER_CONCURRENCY:-2}
      - --prefetch-multiplier=1
      - --max-tasks-per-child=50
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  crawler-celery-beat:
    image: ${IMAGE:-celery-crawl-hub:latest}
    pull_policy: never
    <<: *app-env
    command: ["celery", "-A", "src.main.tasks.celery_app:celery_app", "beat", "-l", "info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    ports:
      - "${WEB_PORT:-3000}:80"
    volumes:
      - ../../web/dist:/usr/share/nginx/html:ro
      - ../../deploy/docker/nginx-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      crawler-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
